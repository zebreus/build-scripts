name: 'Fetch packages'
description: 'Fetch a number of packages from build-scripts and combine them in one directory'
author: 'wasix-org'

branding:
  icon: 'archive'
  color: 'purple'

inputs:
  release:
    description: 'The build-scripts release the packages should be fetched from'
    type: string
    required: false
    default: 'v0.1.0'
  
  github_token:
    description: 'GitHub token for API requests and downloads. Pass secrets.GITHUB_TOKEN'
    type: string
    required: false
    default: ''
  
  packages:
    description: 'Comma separated list of packages to fetch.'
    type: string
    required: true
  
  output:
    description: 'Where to put the packages'
    type: string
    default: '$HOME/.build-scripts/pkgs'
    required: false
  
  merge:
    description: 'Allow installing packages into an existing sysroot directory'
    type: boolean
    default: false
    required: false

outputs:
  path:
    description: 'Path to the fetched packages'
    value: ${{ steps.assemble-packages.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Ensure dependencies are available
      shell: sh
      run: |
        if ! command -v curl >/dev/null 2>&1; then
          echo "curl not found, attempting to install..."
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache curl
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y curl
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm curl
          elif command -v brew >/dev/null 2>&1; then
            brew install curl
          else
            echo "Error: curl is not installed and no supported package manager found"
            exit 1
          fi
        fi

        if ! command -v sed >/dev/null 2>&1; then
          echo "sed not found, attempting to install..."
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache sed
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y sed
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm sed
          elif command -v brew >/dev/null 2>&1; then
            brew install gnu-sed
          else
            echo "Error: sed is not installed and no supported package manager found"
            exit 1
          fi
        fi
        
        if ! command -v xz >/dev/null 2>&1; then
          echo "curl not found, attempting to install..."
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache xz
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y xz-utils
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm xz
          elif command -v brew >/dev/null 2>&1; then
            brew install xz
          else
            echo "Error: xz is not installed and no supported package manager found"
            exit 1
          fi
        fi
        
        if ! command -v tar >/dev/null 2>&1; then
          echo "curl not found, attempting to install..."
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache tar
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y tar
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm tar
          elif command -v brew >/dev/null 2>&1; then
            brew install gnu-tar
          else
            echo "Error: tar is not installed and no supported package manager found"
            exit 1
          fi
        fi

    - name: Fetch and assemble packages
      shell: bash
      id: assemble-packages
      run: |
        curl -sSfL https://raw.githubusercontent.com/wasix-org/build-scripts/refs/heads/main/assemble-pkgs.sh -o assemble-pkgs.sh
        chmod +x assemble-pkgs.sh
        
        # Convert comma-separated list to array
        IFS=',' read -ra PKGS <<< "${{ inputs.packages }}"
        
        # Build the command array
        CMD_ARGS=()
        for pkg in "${PKGS[@]}"; do
          # Trim whitespace
          pkg=$(echo "$pkg" | xargs)
          CMD_ARGS+=("--input" "$pkg")
        done
        
        OUTPUT="${{ inputs.output }}"
        CMD_ARGS+=("--output-dir" "$OUTPUT")
        
        if [ -n "${{ inputs.release }}" ]; then
          CMD_ARGS+=("--release" "${{ inputs.release }}")
        fi
        
        if [ -n "${{ inputs.github_token }}" ]; then
          CMD_ARGS+=("--github-token" "${{ inputs.github_token }}")
        fi
        
        if [ "${{ inputs.merge }}" = "true" ]; then
          CMD_ARGS+=("--merge")
        fi
        
        echo "Running: ./assemble-pkgs.sh ${CMD_ARGS[*]}"
        ./assemble-pkgs.sh "${CMD_ARGS[@]}"

        echo "path=$OUTPUT" >> $GITHUB_OUTPUT
